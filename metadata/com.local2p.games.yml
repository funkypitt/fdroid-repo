Name: 2P Games
SourceCode: https://github.com/funkypitt/local-2p-games
Summary: 16 local 2-player games for mobile. One device, two players, zero internet.
Description: |
  2P Games is a collection of 16 touch-friendly local multiplayer games designed
  for two players sharing one device. No internet needed, no accounts, no ads.

  Tennis (with power-ups), 4 in a Row, Pool, Memory, Snakes, Air Hockey,
  Tank Wars, Ship Battle, Mini Golf, Star Clash, Munch Maze, Awalé,
  Mastermonde, Wheel of Funktune, Pixel Run, and Horse Jump.

  All games feature intuitive touch controls split between the two halves of
  the screen. Built-in calming background music with toggle. Every game has
  rematch support.

  Free and open source. No ads. No tracking. No in-app purchases.
WebSite: https://github.com/funkypitt/local-2p-games
