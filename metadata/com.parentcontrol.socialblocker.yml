Name: Social Blocker
SourceCode: https://github.com/funkypitt/SocialBlocker
Summary: Local DNS VPN that blocks YouTube, Instagram and TikTok on a schedule
Description: |
  Social Blocker installs a local Android VPN that intercepts DNS
  queries for YouTube, Instagram and TikTok and silently drops them.
  Only DNS (UDP 53) is routed through the virtual interface — there
  is no upstream proxy and no certificate, so the rest of the traffic
  is untouched.

  Pick which platforms to block, optionally define daily allow-windows
  (e.g. 6-8,18-22), and protect the settings with a password. The
  service starts automatically on boot and runs as a foreground
  special-use service so Android does not kill it. Combine it with
  Always-on VPN for stricter enforcement.

  Per-platform toggles: YouTube, Instagram, TikTok. Local DNS-only
  VPN — no upstream proxy. Daily schedule windows (block when outside
  the window). Password-protected settings. Auto-start on boot.
  No accounts, no ads, no tracking.
WebSite: https://github.com/funkypitt/SocialBlocker
